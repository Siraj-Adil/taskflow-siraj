services:
    db:
        image: postgres:18
        container_name: taskflow_db
        restart: always
        env_file:
            - .env
        ports:
            - "5432:5432"
        volumes:
            - pgdata:/var/lib/postgresql
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
                ]
            interval: 5s
            timeout: 5s
            retries: 5

    backend:
        build: ./backend
        container_name: taskflow_backend
        restart: always
        depends_on:
            db:
                condition: service_healthy
        env_file:
            - .env
        ports:
            - "3000:3000"
        command: >
            sh -c "
            npx prisma migrate deploy &&
            npx prisma db seed &&
            npm run start
            "

volumes:
    pgdata:
